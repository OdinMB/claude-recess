<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Langton's Ant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #c8c8d0;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    display: flex;
    height: 100vh;
  }
  canvas {
    flex: 1;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #panel {
    width: 260px;
    background: #12121a;
    border-left: 1px solid #2a2a3a;
    padding: 16px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    font-size: 12px;
  }
  h1 { font-size: 15px; color: #e0e0f0; letter-spacing: 2px; text-transform: uppercase; border-bottom: 1px solid #2a2a3a; padding-bottom: 8px; }
  h2 { font-size: 11px; color: #8888aa; letter-spacing: 1px; text-transform: uppercase; margin-top: 4px; }
  p.desc { font-size: 10px; color: #666680; line-height: 1.5; }
  button {
    background: #1e1e2e; color: #c8c8d0; border: 1px solid #3a3a4a;
    padding: 7px 10px; cursor: pointer; font-family: inherit; font-size: 11px;
    transition: background 0.15s;
  }
  button:hover { background: #2a2a3e; }
  button.active { background: #3a2a5e; border-color: #6a5a8a; }
  .btn-row { display: flex; gap: 5px; }
  .btn-row button { flex: 1; }
  input[type=text] {
    background: #1a1a28; color: #ddd; border: 1px solid #3a3a4a;
    padding: 8px 10px; font-family: inherit; font-size: 14px;
    letter-spacing: 3px; text-transform: uppercase; width: 100%;
    text-align: center;
  }
  input[type=text]:focus { outline: none; border-color: #6a5a8a; }
  .slider-row {
    display: flex; align-items: center; gap: 6px;
  }
  .slider-row label { width: 50px; font-size: 11px; color: #8888aa; }
  .slider-row input[type=range] { flex: 1; }
  .slider-row .val { width: 60px; text-align: right; font-size: 11px; color: #aaaacc; }
  input[type=range] {
    -webkit-appearance: none; background: #1e1e2e; height: 4px; border-radius: 2px; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 12px; height: 12px; background: #6a5a8a; border-radius: 50%; cursor: pointer;
  }
  #stats { font-size: 10px; color: #666680; margin-top: auto; padding-top: 8px; border-top: 1px solid #2a2a3a; }
  .rule-display {
    display: flex; gap: 3px; justify-content: center; margin-top: 4px;
  }
  .rule-char {
    width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: bold; border-radius: 3px;
  }
  .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; }
  .preset-grid button { font-size: 10px; padding: 6px 4px; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="panel">
  <h1>Langton's Ant</h1>
  <p class="desc">A turmite walks a grid. At each cell, it turns according to the cell's color state, flips the color to the next state, and moves forward. Rule string: R=right, L=left.</p>

  <h2>Rule</h2>
  <input type="text" id="rule-input" value="RL" placeholder="e.g. RLLR">
  <div class="rule-display" id="rule-display"></div>

  <h2>Presets</h2>
  <div class="preset-grid" id="preset-grid"></div>

  <h2>Speed</h2>
  <div class="slider-row">
    <label>Steps/f</label>
    <input type="range" id="sl-speed" min="1" max="10000" step="1" value="500">
    <span class="val" id="val-speed">500</span>
  </div>

  <h2>Controls</h2>
  <div class="btn-row">
    <button id="btn-reset">Reset</button>
    <button id="btn-pause">Pause</button>
  </div>
  <div class="btn-row">
    <button id="btn-random">Random Rule</button>
  </div>

  <div id="stats"></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// --- Grid ---
const GRID_SIZE = 1024;
const grid = new Uint8Array(GRID_SIZE * GRID_SIZE);

// Ant state
let antX, antY, antDir; // dir: 0=up, 1=right, 2=down, 3=left
let rule = 'RL';
let stepsPerFrame = 500;
let totalSteps = 0;
let paused = false;

// Direction deltas: up, right, down, left
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];

// Colors for states (up to 12 states)
const STATE_COLORS = [
  '#0a0a0f',  // 0 - background
  '#ff4466',  // 1
  '#44aaff',  // 2
  '#44ff88',  // 3
  '#ffaa22',  // 4
  '#cc66ff',  // 5
  '#ff66aa',  // 6
  '#66ffff',  // 7
  '#ffff44',  // 8
  '#ff8844',  // 9
  '#88ff44',  // 10
  '#4488ff',  // 11
];

// Pre-compute color values as RGB for ImageData
const STATE_RGB = STATE_COLORS.map(hex => {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
});

// --- Presets ---
const PRESETS = {
  'RL': 'Classic',
  'RLR': 'Triangle',
  'RLLR': 'Square',
  'LLRR': 'Symmetric',
  'LRRL': 'Chaos',
  'RRLLLRLLLLL': 'Fibonacci',
  'RRLL': 'Growth',
  'RLRL': 'Diamond',
  'RRLR': 'Spiral',
  'LLRL': 'Organic',
  'RLLLLRL': 'Snowflake',
  'RRLRLLRLR': 'Fractal',
};

function reset() {
  grid.fill(0);
  antX = Math.floor(GRID_SIZE / 2);
  antY = Math.floor(GRID_SIZE / 2);
  antDir = 0;
  totalSteps = 0;
  needsFullRedraw = true;
}

function setRule(r) {
  r = r.toUpperCase().replace(/[^RL]/g, '');
  if (r.length < 2) r = 'RL';
  if (r.length > 12) r = r.slice(0, 12);
  rule = r;
  document.getElementById('rule-input').value = rule;
  updateRuleDisplay();
  reset();
}

function updateRuleDisplay() {
  const container = document.getElementById('rule-display');
  container.innerHTML = '';
  for (let i = 0; i < rule.length; i++) {
    const span = document.createElement('div');
    span.className = 'rule-char';
    span.textContent = rule[i];
    const rgb = STATE_RGB[i % STATE_RGB.length];
    if (i === 0) {
      span.style.background = '#1a1a28';
      span.style.color = '#888';
    } else {
      span.style.background = STATE_COLORS[i];
      span.style.color = '#000';
    }
    container.appendChild(span);
  }
}

// --- Simulation ---
let dirtyPixels = [];
let needsFullRedraw = true;

function step() {
  const idx = antY * GRID_SIZE + antX;
  const state = grid[idx];
  const numStates = rule.length;

  // Turn based on rule
  if (rule[state] === 'R') {
    antDir = (antDir + 1) % 4;
  } else {
    antDir = (antDir + 3) % 4;
  }

  // Advance state
  const newState = (state + 1) % numStates;
  grid[idx] = newState;
  dirtyPixels.push(antX, antY, newState);

  // Move
  antX = (antX + DX[antDir] + GRID_SIZE) % GRID_SIZE;
  antY = (antY + DY[antDir] + GRID_SIZE) % GRID_SIZE;
}

// --- Rendering ---
// We'll use an offscreen canvas at GRID_SIZE and scale it
const offCanvas = document.createElement('canvas');
offCanvas.width = GRID_SIZE;
offCanvas.height = GRID_SIZE;
const offCtx = offCanvas.getContext('2d');
let imageData = offCtx.createImageData(GRID_SIZE, GRID_SIZE);
const pixels = imageData.data;

// Initialize to black
for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
  const pi = i * 4;
  pixels[pi] = 10;
  pixels[pi+1] = 10;
  pixels[pi+2] = 15;
  pixels[pi+3] = 255;
}

function fullRedraw() {
  for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
    const state = grid[i];
    const rgb = STATE_RGB[state % STATE_RGB.length];
    const pi = i * 4;
    pixels[pi] = rgb[0];
    pixels[pi+1] = rgb[1];
    pixels[pi+2] = rgb[2];
  }
  needsFullRedraw = false;
}

function applyDirty() {
  for (let i = 0; i < dirtyPixels.length; i += 3) {
    const x = dirtyPixels[i];
    const y = dirtyPixels[i+1];
    const state = dirtyPixels[i+2];
    const rgb = STATE_RGB[state % STATE_RGB.length];
    const pi = (y * GRID_SIZE + x) * 4;
    pixels[pi] = rgb[0];
    pixels[pi+1] = rgb[1];
    pixels[pi+2] = rgb[2];
  }
  dirtyPixels.length = 0;
}

function draw() {
  if (needsFullRedraw) {
    fullRedraw();
  } else {
    applyDirty();
  }

  // Draw ant position
  const antPI = (antY * GRID_SIZE + antX) * 4;
  const savedR = pixels[antPI];
  const savedG = pixels[antPI+1];
  const savedB = pixels[antPI+2];
  pixels[antPI] = 255;
  pixels[antPI+1] = 255;
  pixels[antPI+2] = 255;

  offCtx.putImageData(imageData, 0, 0);

  // Restore ant pixel
  pixels[antPI] = savedR;
  pixels[antPI+1] = savedG;
  pixels[antPI+2] = savedB;

  // Scale to canvas
  const panel = document.getElementById('panel');
  const W = window.innerWidth - panel.offsetWidth;
  const H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;

  // Fit and center
  const scale = Math.min(W / GRID_SIZE, H / GRID_SIZE);
  const dw = GRID_SIZE * scale;
  const dh = GRID_SIZE * scale;
  const dx = (W - dw) / 2;
  const dy = (H - dh) / 2;

  ctx.fillStyle = '#050508';
  ctx.fillRect(0, 0, W, H);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(offCanvas, dx, dy, dw, dh);
}

// --- Main Loop ---
let frameCount = 0;
let fpsTime = 0;
let fps = 0;

function loop(time) {
  requestAnimationFrame(loop);

  frameCount++;
  if (time - fpsTime > 1000) {
    fps = frameCount;
    frameCount = 0;
    fpsTime = time;
    document.getElementById('stats').textContent =
      `${fps} fps · ${(totalSteps/1000).toFixed(0)}k steps · rule: ${rule}`;
  }

  if (!paused) {
    for (let i = 0; i < stepsPerFrame; i++) {
      step();
    }
    totalSteps += stepsPerFrame;
  }

  draw();
}

// --- UI ---
document.getElementById('rule-input').addEventListener('change', function() {
  setRule(this.value);
});
document.getElementById('rule-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') setRule(this.value);
});

document.getElementById('btn-reset').addEventListener('click', reset);
document.getElementById('btn-pause').addEventListener('click', function() {
  paused = !paused;
  this.textContent = paused ? 'Resume' : 'Pause';
  this.classList.toggle('active', paused);
});

document.getElementById('btn-random').addEventListener('click', () => {
  const len = 2 + Math.floor(Math.random() * 10);
  let r = '';
  for (let i = 0; i < len; i++) r += Math.random() > 0.5 ? 'R' : 'L';
  setRule(r);
});

const sl = document.getElementById('sl-speed');
const valSpeed = document.getElementById('val-speed');
sl.addEventListener('input', () => {
  stepsPerFrame = Number(sl.value);
  valSpeed.textContent = stepsPerFrame;
});

// Build preset grid
const presetGrid = document.getElementById('preset-grid');
for (const [rule, name] of Object.entries(PRESETS)) {
  const btn = document.createElement('button');
  btn.textContent = `${name}`;
  btn.title = rule;
  btn.addEventListener('click', () => setRule(rule));
  presetGrid.appendChild(btn);
}

// --- Init ---
setRule('RL');
requestAnimationFrame(loop);
</script>
</body>
</html>
